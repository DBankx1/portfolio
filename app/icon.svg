<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0630"/>
      <stop offset="1" stop-color="#030014"/>
    </linearGradient>
    <linearGradient id="planet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34e3f7"/>
      <stop offset="0.55" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- stars -->
  <circle cx="13" cy="15" r="1.4" fill="#e8e6f5" opacity="0.9"/>
  <circle cx="53" cy="46" r="1.2" fill="#e8e6f5" opacity="0.7"/>
  <circle cx="20" cy="52" r="1" fill="#e8e6f5" opacity="0.55"/>
  <path d="M49 6.5 L50.4 10.6 L54.5 12 L50.4 13.4 L49 17.5 L47.6 13.4 L43.5 12 L47.6 10.6 Z" fill="#e8e6f5" opacity="0.95"/>

  <!-- planet with orbit ring -->
  <g transform="translate(32 35) rotate(-20)">
    <ellipse rx="24" ry="8.5" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.45"/>
    <circle r="14.5" fill="url(#planet)"/>
    <circle cx="-5" cy="-5.5" r="6" fill="#ffffff" opacity="0.22"/>
    <path d="M -24 0 A 24 8.5 0 0 0 24 0" fill="none" stroke="url(#ring)" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
